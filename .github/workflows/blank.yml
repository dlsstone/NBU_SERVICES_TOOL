name: Build Windows EXE

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        shell: cmd
        run: pyinstaller --noconfirm --clean --onefile --windowed --name VRC_Desktop_Tool app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NBU_SERVICES_TOOL
          path: dist/NBU_SERVICES_TOOL.exe
